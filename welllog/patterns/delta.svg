<svg xmlns="http://www.w3.org/2000/svg" width="24" height="16" viewBox="0 0 24 16">
  <defs>
    <pattern id="pat-delta" patternUnits="userSpaceOnUse" width="24" height="16">
      <rect width="24" height="16" fill="#fef3c7"/>
      <!-- Delta foreset bedding - diagonal lines -->
      <line x1="0" y1="0" x2="12" y2="8" stroke="#b45309" stroke-width="0.8"/>
      <line x1="12" y1="0" x2="24" y2="8" stroke="#b45309" stroke-width="0.8"/>
      <line x1="0" y1="8" x2="12" y2="16" stroke="#b45309" stroke-width="0.8"/>
      <line x1="12" y1="8" x2="24" y2="16" stroke="#b45309" stroke-width="0.8"/>
      <!-- Sand grains -->
      <circle cx="6" cy="4" r="0.6" fill="#92400e"/>
      <circle cx="18" cy="12" r="0.6" fill="#92400e"/>
    </pattern>
  </defs>
  <rect width="24" height="16" fill="url(#pat-delta)"/>
</svg>
