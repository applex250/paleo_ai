<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <pattern id="pat-evaporite" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#fef3c7"/>
      <!-- Evaporite: grid pattern (CNPC ZFY-F1.6-15H Hard Anhydrite) -->
      <!-- Horizontal lines -->
      <line x1="0" y1="0" x2="16" y2="0" stroke="#b45309" stroke-width="0.5"/>
      <line x1="0" y1="4" x2="16" y2="4" stroke="#b45309" stroke-width="0.5"/>
      <line x1="0" y1="8" x2="16" y2="8" stroke="#b45309" stroke-width="0.5"/>
      <line x1="0" y1="12" x2="16" y2="12" stroke="#b45309" stroke-width="0.5"/>
      <!-- Vertical lines -->
      <line x1="0" y1="0" x2="0" y2="16" stroke="#b45309" stroke-width="0.5"/>
      <line x1="4" y1="0" x2="4" y2="16" stroke="#b45309" stroke-width="0.5"/>
      <line x1="8" y1="0" x2="8" y2="16" stroke="#b45309" stroke-width="0.5"/>
      <line x1="12" y1="0" x2="12" y2="16" stroke="#b45309" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="16" height="16" fill="url(#pat-evaporite)"/>
</svg>
