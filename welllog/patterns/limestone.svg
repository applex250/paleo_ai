<svg xmlns="http://www.w3.org/2000/svg" width="24" height="16" viewBox="0 0 24 16">
  <defs>
    <pattern id="pat-limestone" patternUnits="userSpaceOnUse" width="24" height="16">
      <rect width="24" height="16" fill="#e0e7ff"/>
      <!-- 灰岩: 砖块状图案 (GB/T 岩石图式 石灰岩符号) -->
      <!-- Horizontal lines -->
      <line x1="0" y1="0" x2="24" y2="0" stroke="#4338ca" stroke-width="0.6"/>
      <line x1="0" y1="8" x2="24" y2="8" stroke="#4338ca" stroke-width="0.6"/>
      <!-- Vertical lines - offset between rows (brick pattern) -->
      <line x1="8" y1="0" x2="8" y2="8" stroke="#4338ca" stroke-width="0.4"/>
      <line x1="18" y1="0" x2="18" y2="8" stroke="#4338ca" stroke-width="0.4"/>
      <!-- Second row vertical lines offset -->
      <line x1="4" y1="8" x2="4" y2="16" stroke="#4338ca" stroke-width="0.4"/>
      <line x1="14" y1="8" x2="14" y2="16" stroke="#4338ca" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="24" height="16" fill="url(#pat-limestone)"/>
</svg>
